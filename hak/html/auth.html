<!DOCTYPE html>
<html lang="ru">
	<head>
		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0">
				<title>Collabo - Вход</title>
				<link rel="stylesheet" href="../css/auth.css">
</head>
	<body>
		<div class="auth-page">
			<div class="auth-card">
				<h1 class="auth-title" id="title">Вход в Collabo</h1>

				<div id="fullNameGroup" style="display: none; margin-bottom: 16px;">
					<label class="form-label">Имя</label>
					<input type="text" id="fullName" class="form-input" placeholder="Иван Иванов">
            </div>

				<div class="form-group" style="margin-bottom: 16px;">
					<label class="form-label">Email</label>
					<input type="email" id="email" class="form-input" placeholder="email@example.com" required="">
            </div>

				<div class="form-group" style="margin-bottom: 16px;">
					<label class="form-label">Пароль</label>
					<input type="password" id="password" class="form-input" placeholder="••••••••" required="">
            </div>

				<button id="submitBtn" class="auth-btn">Войти</button>

				<div class="switch-link" id="switchText">
					Нет аккаунта? <a href="#" id="switchLink">Зарегистрироваться</a>
				</div>
			</div>
		</div>

		<script>
			let isLogin = true;

			function toggleAuth() {
			isLogin = !isLogin;
			const title = document.getElementById('title');
			const fullNameGroup = document.getElementById('fullNameGroup');
			const submitBtn = document.getElementById('submitBtn');
			const switchText = document.getElementById('switchText');

			if (isLogin) {
			title.innerText = 'Вход в Collabo';
			fullNameGroup.style.display = 'none';
			submitBtn.innerText = 'Войти';
			switchText.innerHTML = 'Нет аккаунта? <a href="#" id="switchLink">Зарегистрироваться</a>';
			} else {
			title.innerText = 'Регистрация в Collabo';
			fullNameGroup.style.display = 'block';
			submitBtn.innerText = 'Зарегистрироваться';
			switchText.innerHTML = 'Уже есть аккаунт? <a href="#" id="switchLink">Войти</a>';
			}
			document.getElementById('switchLink').addEventListener('click', (e) => {
			e.preventDefault();
			toggleAuth();
			});
			}

			document.getElementById('switchLink').addEventListener('click', (e) => {
			e.preventDefault();
			toggleAuth();
			});

			document.getElementById('submitBtn').addEventListener('click', async () => {
			const email = document.getElementById('email').value;
			const password = document.getElementById('password').value;

			if (isLogin) {
			const res = await fetch('/api/auth/login', {
			method: 'POST',
			headers: { 'Content-Type': 'application/json' },
			body: JSON.stringify({ email, password })
			});
			if (res.ok) {
			const data = await res.json();
			console.log('Данные от сервера:', data);
			console.log('Email для сохранения:', email);
			localStorage.setItem('token', data.token);
			localStorage.setItem('userId', data.userId);
			localStorage.setItem('userName', data.userName);
			localStorage.setItem('userEmail', email);
			console.log('После сохранения, userEmail:', localStorage.getItem('userEmail'));
			window.location.href = 'board.html';
			} else {
			console.log('Ошибка входа, статус:', res.status);
			alert('Неверный email или пароль');
			}
			} else {
			const fullName = document.getElementById('fullName').value;
			const res = await fetch('/api/auth/register', {
			method: 'POST',
			headers: { 'Content-Type': 'application/json' },
			body: JSON.stringify({ email, password, fullName })
			});
			if (res.ok) {
			alert('Регистрация успешна! Теперь войдите.');
			toggleAuth();
			} else {
			const error = await res.text();
			alert('Ошибка: ' + error);
			}
			}
			});
		</script>
	</body>
</html>
