<!DOCTYPE html>
<html lang="ru">
	<head>
		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0">
				<title>Доска</title>
				<link rel="stylesheet" href="../css/style.css">
				</head>
	<body>

		<div class="container">
			<!-- ЛЕВЫЙ САЙДБАР -->
			<aside class="sidebar">
				<div class="sidebar-top">
					<div class="logo">Collabo</div>
					<div class="menu">
						<a href="create-board.html" class="menu-item">+ Создать доску</a>
					</div>
				</div>
				<div class="sidebar-bottom">
					<a href="auth.html" class="btn-logout" style="text-decoration: none; display: block;">Выйти</a>
				</div>
			</aside>

			<!-- ЦЕНТРАЛЬНАЯ ОБЛАСТЬ -->
			<main class="main-content">
				<header class="top-bar">
					<h1>Название доски</h1>
					<div class="avatar">A</div>
				</header>

				<!-- ФИЛЬТРАЦИЯ И ЭКСПОРТ -->
				<div class="filter-bar">
					<input type="text" id="searchInput" placeholder="🔍 Поиск задач...">
						<select id="priorityFilter">
							<option value="all">Все приоритеты</option>
							<option value="high">Высокий</option>
							<option value="medium">Средний</option>
							<option value="low">Низкий</option>
						</select>
						<select id="statusFilter">
							<option value="all">Все статусы</option>
							<option value="todo">К исполнению</option>
							<option value="progress">В работе</option>
							<option value="done">Готово</option>
						</select>

						<div class="export-dropdown">
							<button id="exportBtn" class="export-btn">📎 Экспорт ▼</button>
							<div id="exportMenu" class="export-menu">
								<div onclick="exportToJSON()">📄 Экспорт в JSON</div>
								<div onclick="exportToCSV()">📊 Экспорт в CSV</div>
							</div>
						</div>
					</div>

				<div class="board-area">
					<div class="board-columns-container">
						<div class="column">
							<div class="column-header">
								<span class="column-title">To-Do</span>
								<span class="column-edit">Изменить</span>
							</div>
							<button class="add-task-btn">+ Добавить задачу</button>
						</div>
						<div class="column">
							<div class="column-header">
								<span class="column-title">In Progress</span>
								<span class="column-edit">Изменить</span>
							</div>
							<button class="add-task-btn">+ Добавить задачу</button>
						</div>
						<div class="column">
							<div class="column-header">
								<span class="column-title">Done</span>
								<span class="column-edit">Изменить</span>
							</div>
						</div>
					</div>
					<div class="board-actions">
						<span id="open-add-column-btn" class="action-light">Добавить новый столбец</span>
						<span id="open-board-params-btn" class="action-bold">Параметры доски</span>
					</div>
				</div>
			</main>
		</div>

		<!-- ПРАВАЯ ПАНЕЛЬ -->
		<aside id="task-sidebar" class="sidebar-right hidden">
			<button class="close-btn">Закрыть</button>
			<div class="field-label">Название выбранной задачи:</div>
			<input type="text" class="input-task-name">
				<div class="field-label">Описание задачи:</div>
				<textarea class="textarea-task-desc"></textarea>
				<div class="task-info-list">
					<div class="task-info-item" id="sidebar-created-date">Дата создания: </div>
					<div class="task-info-item">
						<label style="display: block; margin-bottom: 5px; font-weight: bold;">Дедлайн:</label>
						<input type="date" class="sidebar-input-deadline" style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid #ccc;">
            </div>
					<div class="task-info-item">
						<label style="display: block; margin-bottom: 5px; font-weight: bold;">Исполнитель:</label>
						<select class="sidebar-input-executor" style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid #ccc;">
							<option value="">Не назначен</option>
							<option value="user1">Иван Иванов</option>
							<option value="user2">Анна Смирнова</option>
						</select>
					</div>
					<div class="task-info-item">
						<label style="display: block; margin-bottom: 5px; font-weight: bold;">Важность:</label>
						<select class="sidebar-input-priority" style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid #ccc;">
							<option value="low">Низкий</option>
							<option value="medium">Средний</option>
							<option value="high">Высокий</option>
						</select>
					</div>
					<div class="task-info-item">
						<label style="display: block; margin-bottom: 5px; font-weight: bold;">Статус:</label>
						<select class="sidebar-input-status" style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid #ccc;">
							<option value="To-Do">To-Do</option>
							<option value="In Progress">In Progress</option>
							<option value="Done">Done</option>
						</select>
					</div>
					<div class="task-info-item">
						<label style="display: block; margin-bottom: 5px; font-weight: bold;">Теги (через запятую):</label>
						<input type="text" class="sidebar-input-tags" placeholder="design, bug, срочно" style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid #ccc;">
							<div id="sidebar-tags-container" style="display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;"></div>
						</div>
				</div>
				<button class="btn-apply-changes">
					Применить<br>изменения</button>
			</aside>

		<!-- МОДАЛЬНЫЕ ОКНА -->
		<!-- 4. МОДАЛЬНОЕ ОКНО: СОЗДАНИЕ ЗАДАЧИ -->
		<div id="add-task-modal" class="modal-overlay hidden">
			<div class="modal-container">
				<button class="modal-close">Закрыть</button>
				<h2 class="modal-title-main">Создать задачу</h2>

				<div class="modal-form-group">
					<label class="modal-label">Название</label>
					<input type="text" id="taskTitle" class="modal-input" placeholder="Введите название задачи">
        </div>

				<div class="modal-form-group">
					<label class="modal-label">Описание</label>
					<textarea id="taskDesc" class="modal-input" rows="3" placeholder="Подробное описание задачи"></textarea>
				</div>

				<div class="modal-form-group">
					<label class="modal-label">Исполнитель</label>
					<select id="taskAssignee" class="modal-input">
						<option value="" selected="">Не назначен</option>
						<option value="user1">Иван Иванов</option>
						<option value="user2">Анна Смирнова</option>
					</select>
				</div>

				<div class="modal-form-group">
					<label class="modal-label">Дедлайн</label>
					<input type="date" id="taskDueDate" class="modal-input">
        </div>

				<div class="modal-form-group">
					<label class="modal-label">Приоритет</label>
					<select id="taskPriority" class="modal-input">
						<option value="low">Низкий</option>
						<option value="medium" selected="">Средний</option>
						<option value="high">Высокий</option>
					</select>
				</div>

				<div class="modal-form-group">
					<label class="modal-label">Теги</label>
					<input type="text" id="taskTags" class="modal-input" placeholder="Например: design, bug, срочно">
        </div>

				<button class="modal-submit-btn" onclick="submitTask()">Создать задачу</button>
			</div>
		</div>

		<div id="edit-column-modal" class="modal-overlay hidden">
			<div class="modal-container">
				<button class="modal-close">Закрыть</button>
				<h2 class="modal-title-main">Редактировать столбец</h2>
				<div class="modal-form-group">
					<label class="modal-label">Название</label>
					<input type="text" class="modal-input id-col-name">
				</div>
				<div class="modal-form-group">
					<label class="modal-label">Кто может добавлять?</label>
					<select class="modal-input id-col-role">
						<option value="all">Все</option>
						<option value="admin">Админы</option>
					</select>
				</div>
				<button class="modal-submit-btn id-save-col-btn">Сохранить</button>
				<button class="modal-submit-btn id-delete-col-btn" style="background:#ef4444">Удалить</button>
			</div>
		</div>

		<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.js"></script>
		<script src="../js/api-integration.js"></script>
		<script src="../js/sidebar-navigation.js"></script>
		<script src="../js/script.js"></script>
	</body>
</html>
