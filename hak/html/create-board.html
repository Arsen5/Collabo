<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание доски</title>
    <!-- Подключение файла стилей -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div class="container">

        <!-- Сайдбар -->
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="logo">Collabo</div>
                <div class="menu">
                    <!-- Активный пункт меню -->
                    <a href="#" class="menu-item active">Создать доску</a>
                </div>
            </div>

            <div class="sidebar-bottom">
                <button class="btn-logout">Выйти</button>
            </div>
        </aside>

        <!-- Основная часть -->
        <main class="main-content">

            <!-- Верхняя панель -->
            <header class="top-bar">
                <h1>Создайте новую доску</h1>
                <div class="avatar">A</div>
            </header>

            <!-- Центральная форма -->
            <div class="form-container">

                <!-- Поле названия -->
                <div class="form-group">
                    <h2>Введите название доски</h2>
                    <input type="text" class="input-large">
                </div>

                <!-- Поле приглашения -->
                <div class="form-group spacing-top">
                    <h2>Добавьте коллег</h2>
                    <p class="subtitle">Введите email в поле ниже</p>
                    <div class="invite-row">
                        <input type="email" class="input-medium">
                        <button class="btn-invite">Пригласить</button>
                    </div>
                </div>

                <!-- Главная кнопка -->
                <button class="btn-submit">Создать</button>

            </div>
        </main>
    </div>

</body>
</html>
