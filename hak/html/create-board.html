<!DOCTYPE html>
<html lang="ru">
	<head>
		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0">
				<title>Создание доски</title>
				<link rel="stylesheet" href="../css/create-board.css">
</head>
	<body>

		<div class="container">
			<aside class="sidebar">
				<div class="sidebar-top">
					<div class="logo">Collabo</div>
					<div class="menu">
						<a href="board.html" class="menu-item">Мои доски</a>
						<a href="create-board.html" class="menu-item active">+ Создать доску</a>
					</div>
				</div>
				<div class="sidebar-bottom">
					<a href="auth.html" class="btn-logout" style="text-decoration: none; display: block;">Выйти</a>
				</div>
			</aside>

			<main class="main-content">
				<header class="top-bar">
					<h1 id="pageTitle">Создание доски</h1>
					<div class="avatar">A</div>
				</header>

				<div class="form-container">
					<div class="form-group">
						<h2>Введите название доски</h2>
						<input type="text" class="input-large" id="boardNameInput">
                </div>

					<div class="form-group spacing-top">
						<h2>Добавьте коллег</h2>
						<p class="subtitle">Введите email в поле ниже</p>
						<div class="invite-row">
							<input type="email" class="input-medium" id="inviteEmail">
								<button class="btn-invite" id="inviteBtn">Пригласить</button>
							</div>
					</div>

					<button class="btn-submit" id="createBoardBtn">Создать</button>
				</div>
			</main>
		</div>

		<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.js"></script>
		<script src="../js/api-integration.js"></script>
		<script src="../js/sidebar-navigation.js"></script>

		<script>
			// Устанавливаем заголовок
			const titleEl = document.querySelector('.top-bar h1');
			if (titleEl) titleEl.textContent = 'Создание доски';

			// Создание доски + приглашение
			document.getElementById('createBoardBtn').addEventListener('click', async () => {
			const boardName = document.getElementById('boardNameInput').value.trim();
			const inviteEmail = document.getElementById('inviteEmail').value.trim();

			if (!boardName) {
			alert('Введите название доски');
			return;
			}

			if (typeof createBoardOnServer === 'undefined') {
			console.error('createBoardOnServer не определён');
			alert('Ошибка: скрипты не загружены. Обновите страницу');
			return;
			}

			try {
			// Создаём доску
			const board = await createBoardOnServer(boardName);

			// Если указан email — приглашаем
			if (inviteEmail) {
			const token = localStorage.getItem('token');
			const inviteRes = await fetch(`${window.API_URL}/boards/${board.id}/invite`, {
			method: 'POST',
			headers: {
			'Content-Type': 'application/json',
			'Authorization': `Bearer ${token}`
			},
			body: JSON.stringify({ email: inviteEmail })
			});

			if (inviteRes.ok) {
			alert(`Доска "${boardName}" создана! Пользователь ${inviteEmail} приглашён.`);
			} else {
			const error = await inviteRes.text();
			alert(`Доска создана, но не удалось пригласить: ${error}`);
			}
			} else {
			alert(`Доска "${boardName}" создана!`);
			}

			window.location.href = 'board.html';
			} catch (error) {
			console.error('Ошибка создания:', error);
			alert('Ошибка создания доски');
			}
			});

			// Кнопка "Пригласить" (отдельное приглашение после создания)
			document.getElementById('inviteBtn').addEventListener('click', async () => {
			const email = document.getElementById('inviteEmail').value.trim();
			if (!email) {
			alert('Введите email');
			return;
			}

			// Получаем ID текущей доски (если мы на странице board.html)
			const currentBoardId = localStorage.getItem('collabo_current_board_id');
			if (!currentBoardId) {
			alert('Сначала создайте доску');
			return;
			}

			const token = localStorage.getItem('token');
			const response = await fetch(`${window.API_URL}/boards/${currentBoardId}/invite`, {
			method: 'POST',
			headers: {
			'Content-Type': 'application/json',
			'Authorization': `Bearer ${token}`
			},
			body: JSON.stringify({ email })
			});

			if (response.ok) {
			alert(`Приглашение отправлено на ${email}`);
			document.getElementById('inviteEmail').value = '';
			} else {
			const error = await response.text();
			alert('Ошибка: ' + error);
			}
			});
		</script>
	</body>
</html>
